<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Закупка</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:     #ffffff; --bg2: #f2f2f7; --bg3: #e5e5ea;
  --text:   #111111; --hint: #8e8e93; --accent: #3390ec;
  --atxt:   #ffffff; --border: rgba(0,0,0,0.09);
  --danger: #e53935; --green: #34c759; --orange: #ff9f0a;
  --radius: 16px;
}
html,body { height:100%; overflow:hidden; font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--text); font-size:16px; -webkit-tap-highlight-color:transparent; -webkit-text-size-adjust:100%; }
#app { display:flex; flex-direction:column; width:100%; height:100%; overflow:hidden; max-width:900px; margin:0 auto; }

/* Header */
.hdr { flex-shrink:0; padding:16px 20px 10px; border-bottom:1px solid var(--border); }
.hdr-title { font-size:20px; font-weight:700; }
.hdr-sub { font-size:13px; color:var(--hint); margin-top:2px; }

/* Scrollable body */
.body { flex:1; overflow-y:auto; overflow-x:hidden; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; min-height:0; }
.body::-webkit-scrollbar { display:none; }

/* Bottom bar */
.bbar { flex-shrink:0; padding:12px 20px; padding-bottom:max(16px,calc(env(safe-area-inset-bottom,0px)+12px)); background:var(--bg); border-top:1px solid var(--border); }
.btn-main { width:100%; height:56px; border:none; border-radius:var(--radius); background:var(--accent); color:var(--atxt); font-size:17px; font-weight:600; cursor:pointer; font-family:inherit; box-shadow:0 4px 14px rgba(51,144,236,.35); -webkit-appearance:none; transition:opacity .15s; }
.btn-main:active { opacity:.8; }
.btn-main:disabled { opacity:.4; box-shadow:none; }
.btn-main.green { background:var(--green); box-shadow:0 4px 14px rgba(52,199,89,.35); }

/* Loading */
#loading { display:flex; position:fixed; inset:0; flex-direction:column; align-items:center; justify-content:center; background:var(--bg); z-index:1000; }
.spin { width:40px; height:40px; border:3px solid var(--bg3); border-top-color:var(--accent); border-radius:50%; animation:spin .7s linear infinite; margin-bottom:16px; }
@keyframes spin { to { transform:rotate(360deg); } }
.ldtxt { color:var(--hint); font-size:15px; }

/* Object list */
.obj-list { padding:12px 16px; }
.obj-card { background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--radius); padding:16px; margin-bottom:12px; cursor:pointer; transition:all .15s; position:relative; overflow:hidden; }
.obj-card:active { opacity:.7; }
.obj-card-top { display:flex; align-items:flex-start; gap:12px; }
.obj-prio { width:10px; height:10px; border-radius:50%; flex-shrink:0; margin-top:5px; }
.obj-prio.high   { background:var(--danger); box-shadow:0 0 6px rgba(229,57,53,.5); }
.obj-prio.medium { background:var(--orange); box-shadow:0 0 6px rgba(255,159,10,.5); }
.obj-prio.low    { background:var(--green);  box-shadow:0 0 6px rgba(52,199,89,.5); }
.obj-info { flex:1; }
.obj-name { font-size:16px; font-weight:700; line-height:1.3; }
.obj-addr { font-size:13px; color:var(--hint); margin-top:2px; }
.obj-meta { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
.meta-tag { display:inline-flex; align-items:center; gap:4px; padding:4px 10px; border-radius:20px; font-size:12px; font-weight:600; }
.meta-tag.items  { background:rgba(51,144,236,.1); color:var(--accent); }
.meta-tag.high   { background:rgba(229,57,53,.1);  color:var(--danger); }
.meta-tag.medium { background:rgba(255,159,10,.1); color:#b36800; }
.meta-tag.low    { background:rgba(52,199,89,.1);  color:#1a8c3a; }
.obj-arrow { color:var(--hint); font-size:18px; margin-top:2px; }

/* Detail view */
#detail-view { display:none; flex-direction:column; height:100%; }
#detail-view.show { display:flex; }
.detail-hdr { flex-shrink:0; padding:14px 20px 10px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.back-btn { width:36px; height:36px; border:none; background:var(--bg2); border-radius:10px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; -webkit-appearance:none; }
.back-btn:active { opacity:.6; }
.detail-title-wrap { flex:1; min-width:0; }
.detail-title { font-size:17px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.detail-sub { font-size:12px; color:var(--hint); margin-top:1px; }
.detail-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; overscroll-behavior:contain; min-height:0; padding:14px 16px; }
.detail-body::-webkit-scrollbar { display:none; }

/* Upload zone */
.upload-zone { border:2px dashed rgba(51,144,236,.4); border-radius:var(--radius); background:rgba(51,144,236,.04); padding:28px 20px; text-align:center; cursor:pointer; transition:all .15s; margin-bottom:14px; }
.upload-zone:active, .upload-zone.drag { border-color:var(--accent); background:rgba(51,144,236,.1); }
.upload-zone .uz-icon { font-size:40px; margin-bottom:10px; }
.upload-zone .uz-title { font-size:15px; color:var(--accent); font-weight:600; }
.upload-zone .uz-sub { font-size:13px; color:var(--hint); margin-top:4px; }
#fileInput { display:none; }

/* File preview */
.file-preview { background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--radius); padding:14px 16px; display:none; align-items:center; gap:12px; margin-bottom:14px; }
.file-preview.show { display:flex; }
.fp-icon { font-size:30px; flex-shrink:0; }
.fp-info { flex:1; min-width:0; }
.fp-name { font-size:15px; font-weight:600; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.fp-size { font-size:13px; color:var(--hint); margin-top:2px; }
.fp-rm { width:32px; height:32px; border:none; background:none; color:var(--danger); font-size:22px; cursor:pointer; border-radius:8px; display:flex; align-items:center; justify-content:center; -webkit-appearance:none; }
.fp-rm:active { background:rgba(229,57,53,.08); }

/* Process button */
.btn-process { width:100%; padding:15px; border:none; border-radius:var(--radius); background:var(--accent); color:var(--atxt); font-size:16px; font-weight:600; cursor:pointer; font-family:inherit; margin-bottom:14px; display:none; -webkit-appearance:none; transition:opacity .15s; box-shadow:0 4px 14px rgba(51,144,236,.3); }
.btn-process.show { display:block; }
.btn-process:active { opacity:.8; }
.btn-process:disabled { opacity:.4; box-shadow:none; }

/* Items matching */
.section-title { font-size:12px; font-weight:600; color:var(--hint); text-transform:uppercase; letter-spacing:.7px; margin-bottom:10px; padding-left:2px; }
.order-item { background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--radius); padding:14px; margin-bottom:10px; transition:all .2s; }
.order-item.matched { border-color:var(--green); background:rgba(52,199,89,.06); }
.order-item.manual  { border-color:var(--accent); background:rgba(51,144,236,.06); }
.oi-top { display:flex; align-items:flex-start; gap:10px; }
.oi-check { width:24px; height:24px; border-radius:6px; border:2px solid var(--bg3); background:var(--bg); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; margin-top:1px; transition:all .15s; font-size:14px; }
.oi-check.on { border-color:var(--green); background:var(--green); color:var(--atxt); }
.oi-info { flex:1; }
.oi-name { font-size:15px; font-weight:600; line-height:1.3; }
.oi-meta { font-size:13px; color:var(--hint); margin-top:3px; }
.oi-price-row { display:flex; align-items:center; gap:8px; margin-top:10px; }
.oi-price-label { font-size:13px; color:var(--hint); flex-shrink:0; }
.oi-price-input { flex:1; padding:9px 12px; border:1.5px solid var(--border); border-radius:10px; background:var(--bg); color:var(--text); font-size:15px; font-family:inherit; outline:none; -webkit-appearance:none; }
.oi-price-input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(51,144,236,.12); }
.match-badge { display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:20px; font-size:11px; font-weight:700; margin-top:6px; }
.match-badge.auto  { background:rgba(52,199,89,.12); color:#1a8c3a; }
.match-badge.check { background:rgba(255,159,10,.12); color:#b36800; }

/* Extra items from receipt */
.extra-items { margin-top:18px; }
.extra-item { background:var(--bg2); border:1.5px solid var(--border); border-radius:var(--radius); padding:12px 14px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.ei-info { flex:1; }
.ei-name { font-size:14px; font-weight:600; }
.ei-price { font-size:13px; color:var(--hint); margin-top:2px; }
.ei-check { width:22px; height:22px; border-radius:6px; border:2px solid var(--bg3); background:var(--bg); display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; font-size:12px; transition:all .15s; }
.ei-check.on { border-color:var(--accent); background:var(--accent); color:var(--atxt); }

/* Processing overlay */
#proc-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:500; flex-direction:column; align-items:center; justify-content:center; gap:16px; }
#proc-overlay.show { display:flex; }
.proc-card { background:var(--bg); border-radius:var(--radius); padding:28px 32px; text-align:center; max-width:280px; }
.proc-title { font-size:17px; font-weight:700; margin-bottom:8px; }
.proc-sub { font-size:14px; color:var(--hint); }

/* Success screen */
#succ-screen { display:none; position:fixed; inset:0; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px; background:var(--bg); z-index:999; }
#succ-screen.show { display:flex; }
.succ-icon { font-size:72px; margin-bottom:20px; }
.succ-title { font-size:24px; font-weight:700; margin-bottom:10px; }
.succ-sub { font-size:16px; color:var(--hint); margin-bottom:32px; line-height:1.5; }
.btn-back-main { padding:17px 36px; border:none; border-radius:var(--radius); background:var(--accent); color:var(--atxt); font-size:17px; font-weight:600; cursor:pointer; font-family:inherit; box-shadow:0 4px 18px rgba(51,144,236,.35); -webkit-appearance:none; }
.btn-back-main:active { opacity:.85; }

/* Access denied */
#access-denied { display:none; position:fixed; inset:0; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px; background:var(--bg); z-index:998; }
#access-denied.show { display:flex; }

/* Empty */
.empty-state { padding:48px 20px; text-align:center; }
.empty-icon { font-size:56px; margin-bottom:16px; }
.empty-title { font-size:18px; font-weight:600; margin-bottom:8px; }
.empty-sub { font-size:14px; color:var(--hint); line-height:1.5; }

/* Store info banner */
.store-banner { background:rgba(51,144,236,.08); border:1.5px solid rgba(51,144,236,.2); border-radius:var(--radius); padding:12px 14px; margin-bottom:14px; display:none; }
.store-banner.show { display:block; }
.sb-title { font-size:13px; font-weight:600; color:var(--accent); margin-bottom:4px; }
.sb-info { font-size:14px; color:var(--text); }
</style>
</head>
<body>
<div id="loading">
  <div class="spin"></div>
  <div class="ldtxt">Загрузка...</div>
</div>

<div id="access-denied">
  <div style="font-size:64px;margin-bottom:16px">⛔</div>
  <div style="font-size:22px;font-weight:700;color:var(--danger);margin-bottom:10px">Доступ запрещён</div>
  <div style="font-size:15px;color:var(--hint);line-height:1.5">У вас нет прав для просмотра этой страницы.<br>Обратитесь к администратору.</div>
</div>

<div id="proc-overlay">
  <div class="proc-card">
    <div class="spin" style="margin:0 auto 16px"></div>
    <div class="proc-title">Обработка чека</div>
    <div class="proc-sub">Gemini анализирует изображение...</div>
  </div>
</div>

<div id="succ-screen">
  <div class="succ-icon">✅</div>
  <div class="succ-title">Оплата подтверждена!</div>
  <div class="succ-sub" id="succ-sub-text">Данные сохранены в таблицу.</div>
  <button class="btn-back-main" onclick="location.reload()">← Вернуться к объектам</button>
</div>

<!-- Main list -->
<div id="main-view" style="display:none;flex-direction:column;height:100%">
  <div class="hdr">
    <div class="hdr-title">🧾 Закупка</div>
    <div class="hdr-sub" id="hdr-sub-text">Объекты с активными заказами</div>
  </div>
  <div class="body" id="obj-list-body">
    <div class="obj-list" id="obj-list"></div>
  </div>
</div>

<!-- Detail view -->
<div id="detail-view">
  <div class="detail-hdr">
    <button class="back-btn" onclick="showMain()">‹</button>
    <div class="detail-title-wrap">
      <div class="detail-title" id="detail-title"></div>
      <div class="detail-sub" id="detail-sub"></div>
    </div>
  </div>
  <div class="detail-body" id="detail-body"></div>
  <div class="bbar" id="detail-bbar">
    <button class="btn-main" id="confirm-btn" onclick="confirmPayment()" disabled>Подтвердить оплату</button>
  </div>
</div>

<input type="file" id="fileInput" accept="image/*,application/pdf" onchange="onFileSelected(event)">

<script>
// ─── CONFIG ────────────────────────────────────────────────────
// GAS_URL передаётся как параметр в URL от Telegram бота
// GEMINI_KEY — передаётся через gas_url как параметр или берётся из GAS API
// ───────────────────────────────────────────────────────────────

const tg = window.Telegram?.WebApp;
if (tg) { tg.expand(); tg.ready(); }

const params   = new URLSearchParams(location.search);
const GAS_URL  = decodeURIComponent(params.get('gas_url') || '');
const USER_ID  = params.get('user_id')  || '';
const USERNAME = decodeURIComponent(params.get('username') || '');
const NAME     = decodeURIComponent(params.get('name')     || '');
const CHAT_ID  = params.get('chat_id')  || '';

// State
let allOrders   = [];   // raw rows from GAS
let groupedObjs = [];   // [{name, address, priority, items:[{...}]}]
let currentObj  = null;
let receiptFile = null;
let receiptItems= [];   // items from Gemini
let checkedMap  = {};   // rowKey -> {checked, price}

// ─── INIT ──────────────────────────────────────────────────────
async function init() {
  if (!GAS_URL) { showAccessDenied(); return; }

  // Check access
  try {
    const r = await fetch(`${GAS_URL}?action=access&user_id=${USER_ID}&username=${encodeURIComponent(USERNAME)}&name=${encodeURIComponent(NAME)}`);
    const d = await r.json();
    if (!d.allowed || (d.access !== 'Покупка' && d.access !== 'Заказы/Покупка')) {
      showAccessDenied(); return;
    }
  } catch(e) {
    showAccessDenied(); return;
  }

  // Load orders
  try {
    const r = await fetch(`${GAS_URL}?action=orders_for_purchase`);
    const d = await r.json();
    allOrders = d.orders || [];
  } catch(e) {
    allOrders = [];
  }

  groupOrders();
  renderMain();
  hide('loading');
  showEl('main-view', 'flex');
}

function showAccessDenied() {
  hide('loading');
  document.getElementById('access-denied').classList.add('show');
}

// ─── GROUP ORDERS ──────────────────────────────────────────────
const PRIO_RANK = { 'Высокий': 3, 'Средний': 2, 'Низкий': 1 };
const PRIO_KEY  = { 'Высокий': 'high', 'Средний': 'medium', 'Низкий': 'low' };
const PRIO_ICON = { 'Высокий': '🔴', 'Средний': '🟡', 'Низкий': '🟢' };

function groupOrders() {
  const map = {};
  allOrders.forEach((row, idx) => {
    // row: [date, object, address, comment, priority, userId, username, name, product, qty, status, rowIndex]
    const obj  = row[1] || '';
    const addr = row[2] || '';
    const prio = row[4] || 'Низкий';
    if (!map[obj]) map[obj] = { name: obj, address: addr, comment: row[3]||'', priority: prio, items: [] };
    // Upgrade priority
    if ((PRIO_RANK[prio]||0) > (PRIO_RANK[map[obj].priority]||0)) map[obj].priority = prio;
    map[obj].items.push({
      product:    row[8] || '',
      qty:        row[9] || '',
      priority:   prio,
      requester:  row[7] || '',
      username:   row[6] || '',
      status:     row[10] || '',
      rowIndex:   row[11],
      _rawIdx:    idx
    });
  });
  groupedObjs = Object.values(map);
}

// ─── RENDER MAIN ───────────────────────────────────────────────
function renderMain() {
  const list = document.getElementById('obj-list');
  if (!groupedObjs.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🎉</div><div class="empty-title">Все заказы обработаны</div><div class="empty-sub">Нет активных заказов ожидающих закупки</div></div>`;
    return;
  }
  document.getElementById('hdr-sub-text').textContent = `${groupedObjs.length} объект${plural(groupedObjs.length)} с активными заказами`;
  list.innerHTML = groupedObjs.map((obj, i) => {
    const pk = PRIO_KEY[obj.priority] || 'low';
    const pi = PRIO_ICON[obj.priority] || '🟢';
    return `
    <div class="obj-card" onclick="openObject(${i})">
      <div class="obj-card-top">
        <div class="obj-prio ${pk}"></div>
        <div class="obj-info">
          <div class="obj-name">${esc(obj.name)}</div>
          ${obj.address ? `<div class="obj-addr">📍 ${esc(obj.address)}</div>` : ''}
          <div class="obj-meta">
            <span class="meta-tag items">📦 ${obj.items.length} поз.</span>
            <span class="meta-tag ${pk}">${pi} ${obj.priority}</span>
          </div>
        </div>
        <div class="obj-arrow">›</div>
      </div>
    </div>`;
  }).join('');
}

// ─── OPEN OBJECT ───────────────────────────────────────────────
function openObject(idx) {
  currentObj = groupedObjs[idx];
  receiptFile = null; receiptItems = []; checkedMap = {};

  document.getElementById('detail-title').textContent = currentObj.name;
  document.getElementById('detail-sub').textContent   = currentObj.address || '';

  renderDetailBody();
  hide('main-view');
  showEl('detail-view', 'flex');
  updateConfirmBtn();
}

function showMain() {
  hide('detail-view');
  showEl('main-view', 'flex');
  currentObj = null;
}

// ─── RENDER DETAIL ─────────────────────────────────────────────
function renderDetailBody() {
  const body = document.getElementById('detail-body');
  const obj  = currentObj;

  let html = `
  <!-- Upload zone -->
  <div class="section-title" style="margin-bottom:8px">Загрузить чек</div>
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('fileInput').click()"
       ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event)">
    <div class="uz-icon">📷</div>
    <div class="uz-title">Нажмите для загрузки</div>
    <div class="uz-sub">Фото или PDF чека</div>
  </div>
  <div class="file-preview" id="file-preview">
    <div class="fp-icon" id="fp-icon">🖼️</div>
    <div class="fp-info">
      <div class="fp-name" id="fp-name"></div>
      <div class="fp-size" id="fp-size"></div>
    </div>
    <button class="fp-rm" onclick="removeFile()">✕</button>
  </div>
  <button class="btn-process" id="btn-process" onclick="processReceipt()">🤖 Распознать чек</button>

  <div class="store-banner" id="store-banner">
    <div class="sb-title">🏪 Магазин из чека</div>
    <div class="sb-info" id="store-info"></div>
  </div>

  <!-- Order items -->
  <div class="section-title">Запрошенные товары</div>
  <div id="order-items-list">
  ${obj.items.map((item, i) => renderOrderItem(item, i)).join('')}
  </div>

  <!-- Extra from receipt -->
  <div class="extra-items" id="extra-items" style="display:none">
    <div class="section-title">Дополнительные позиции из чека</div>
    <div class="extra-sub" style="font-size:13px;color:var(--hint);margin-bottom:10px">Отметьте товары для сохранения в журнал оплат</div>
    <div id="extra-items-list"></div>
  </div>`;

  body.innerHTML = html;
}

function renderOrderItem(item, i) {
  const key    = `item_${i}`;
  const ch     = checkedMap[key];
  const isOn   = ch ? ch.checked : false;
  const price  = ch ? ch.price   : '';
  const pk     = PRIO_KEY[item.priority] || 'low';
  const pi     = PRIO_ICON[item.priority] || '🟢';
  const matchBadge = ch?.autoMatched
    ? `<span class="match-badge auto">✓ Совпадение из чека</span>`
    : (isOn ? `<span class="match-badge check">✎ Вручную</span>` : '');

  return `
  <div class="order-item${isOn ? (ch?.autoMatched ? ' matched' : ' manual') : ''}" id="oi_${key}">
    <div class="oi-top">
      <div class="oi-check${isOn ? ' on' : ''}" onclick="toggleItem('${key}', ${i})" id="chk_${key}">${isOn ? '✓' : ''}</div>
      <div class="oi-info">
        <div class="oi-name">${esc(item.product)}</div>
        <div class="oi-meta">× ${item.qty} шт. · ${pi} ${item.priority} · ${esc(item.requester)}${item.username ? ' (@'+esc(item.username)+')' : ''}</div>
        ${matchBadge}
      </div>
    </div>
    <div class="oi-price-row">
      <span class="oi-price-label">Цена, ₽:</span>
      <input class="oi-price-input" type="number" inputmode="decimal" placeholder="0.00"
             value="${esc(price)}" onchange="setPrice('${key}', this.value)" oninput="setPrice('${key}', this.value)">
    </div>
  </div>`;
}

// ─── FILE HANDLING ─────────────────────────────────────────────
function onDragOver(e) { e.preventDefault(); document.getElementById('upload-zone').classList.add('drag'); }
function onDragLeave()  { document.getElementById('upload-zone').classList.remove('drag'); }
function onDrop(e) {
  e.preventDefault();
  document.getElementById('upload-zone').classList.remove('drag');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
}
function onFileSelected(e) { const f = e.target.files[0]; if (f) setFile(f); }

function setFile(f) {
  receiptFile = f;
  const icon = f.type.includes('pdf') ? '📄' : '🖼️';
  document.getElementById('fp-icon').textContent = icon;
  document.getElementById('fp-name').textContent = f.name;
  document.getElementById('fp-size').textContent = formatSize(f.size);
  document.getElementById('file-preview').classList.add('show');
  document.getElementById('btn-process').classList.add('show');
}
function removeFile() {
  receiptFile = null;
  document.getElementById('file-preview').classList.remove('show');
  document.getElementById('btn-process').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

// ─── GEMINI PROCESSING ─────────────────────────────────────────
// Шаг 1: отправляем фото в Telegram → получаем file_id
// Шаг 2: передаём file_id в GAS → GAS скачивает и вызывает Gemini
async function processReceipt() {
  if (!receiptFile) return;

  const overlay = document.getElementById('proc-overlay');
  const procSub = overlay.querySelector('.proc-sub');
  overlay.classList.add('show');

  try {
    // ── Шаг 1: отправить файл в Telegram через sendDocument ──────
    procSub.textContent = 'Отправка фото в Telegram...';

    const BOT_TOKEN_PARAM = params.get('bot_token') || '';
    const tgApiBase = `https://api.telegram.org/bot${BOT_TOKEN_PARAM}`;

    // Отправляем фото в чат пользователя как документ (сохраняет оригинальное качество)
    const formData = new FormData();
    formData.append('chat_id', CHAT_ID || USER_ID);
    formData.append('document', receiptFile, receiptFile.name);
    formData.append('caption', `📎 Чек для закупки\nОбъект: ${currentObj.name}\nОт: ${NAME}`);
    // Скрываем сообщение от пользователя (тихая отправка)
    formData.append('disable_notification', 'true');

    const tgResp = await fetch(`${tgApiBase}/sendDocument`, {
      method: 'POST',
      body:   formData
    });
    const tgData = await tgResp.json();

    if (!tgData.ok) {
      // Fallback: если токен не передан или ошибка — шлём base64 напрямую
      console.warn('Telegram upload failed, falling back to base64:', tgData.description);
      await processReceiptFallback();
      return;
    }

    // Достаём file_id из ответа Telegram
    const msg      = tgData.result;
    const fileObj  = msg.document || (msg.photo && msg.photo[msg.photo.length - 1]);
    const fileId   = fileObj?.file_id;

    if (!fileId) {
      await processReceiptFallback();
      return;
    }

    // ── Шаг 2: передаём file_id в GAS ────────────────────────────
    procSub.textContent = 'Gemini анализирует изображение...';

    const payload = {
      action:        'process_receipt_tg',
      user_id:       USER_ID,
      name:          NAME,
      object:        currentObj.name,
      tg_file_id:    fileId,
      tg_message_id: msg.message_id,
      mime_type:     receiptFile.type || 'image/jpeg',
      file_name:     receiptFile.name
    };

    const resp = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    const data = await resp.json();

    if (data.ok && data.receipt) {
      receiptItems = data.receipt.items || [];
      applyReceiptMatching(data.receipt);
    } else if (!data.ok) {
      alert('Ошибка распознавания: ' + (data.error || 'неизвестная ошибка'));
    }

  } catch(err) {
    console.error('processReceipt error:', err);
    // При любой ошибке сети — fallback на base64
    await processReceiptFallback();
  } finally {
    overlay.classList.remove('show');
    const procSub2 = overlay.querySelector('.proc-sub');
    if (procSub2) procSub2.textContent = 'Gemini анализирует изображение...';
  }
}

// ─── FALLBACK: старый способ через base64 ──────────────────────
async function processReceiptFallback() {
  try {
    const base64 = await fileToBase64(receiptFile);
    const payload = {
      action:    'process_receipt',
      user_id:   USER_ID,
      name:      NAME,
      object:    currentObj.name,
      file_b64:  base64,
      file_name: receiptFile.name,
      mime_type: receiptFile.type || 'image/jpeg'
    };
    const resp = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    const data = await resp.json();
    if (data.ok && data.receipt) {
      receiptItems = data.receipt.items || [];
      applyReceiptMatching(data.receipt);
    } else if (!data.ok) {
      alert('Ошибка распознавания: ' + (data.error || 'неизвестная ошибка'));
    }
  } catch(e) {
    alert('Ошибка: ' + e.message);
  }
}

function applyReceiptMatching(receipt) {
  // Show store banner
  if (receipt.store_name || receipt.date) {
    const banner = document.getElementById('store-banner');
    banner.classList.add('show');
    document.getElementById('store-info').textContent =
      [receipt.store_name, receipt.date, receipt.total ? 'Итого: ' + receipt.total + ' ₽' : ''].filter(Boolean).join(' · ');
  }

  // Auto-match items
  const items = currentObj.items;
  items.forEach((item, i) => {
    const key   = `item_${i}`;
    const match = findBestMatch(item.product, receipt.items);
    if (match) {
      checkedMap[key] = { checked: true, price: match.price || '', autoMatched: true };
    }
  });

  // Extra items (in receipt but not matched)
  const matchedReceipt = new Set();
  items.forEach((item, i) => {
    if (checkedMap[`item_${i}`]?.autoMatched) {
      const m = findBestMatch(item.product, receipt.items);
      if (m) matchedReceipt.add(m._idx);
    }
  });
  const extras = receipt.items.filter((_, idx) => !matchedReceipt.has(idx));

  // Re-render order items
  const list = document.getElementById('order-items-list');
  list.innerHTML = items.map((item, i) => renderOrderItem(item, i)).join('');

  // Render extras
  if (extras.length) {
    document.getElementById('extra-items').style.display = 'block';
    document.getElementById('extra-items-list').innerHTML = extras.map((ei, i) => `
      <div class="extra-item" id="ei_${i}">
        <div class="ei-info">
          <div class="ei-name">${esc(ei.name || '')}</div>
          <div class="ei-price">${ei.price ? ei.price + ' ₽' : ''}</div>
        </div>
        <div class="ei-check" id="eichk_${i}" onclick="toggleExtra(${i})">${''}</div>
      </div>`).join('');
  }

  updateConfirmBtn();
}

// ─── ITEM TOGGLE ───────────────────────────────────────────────
function toggleItem(key, idx) {
  const cur = checkedMap[key];
  const isOn = !(cur?.checked);
  checkedMap[key] = { ...(cur||{}), checked: isOn, autoMatched: false };
  // Re-render just this card
  const obj  = document.getElementById(`oi_${key}`);
  const chk  = document.getElementById(`chk_${key}`);
  if (isOn) { obj.classList.add('manual'); chk.classList.add('on'); chk.textContent = '✓'; }
  else       { obj.classList.remove('matched','manual'); chk.classList.remove('on'); chk.textContent = ''; }
  updateConfirmBtn();
}

function setPrice(key, val) {
  if (!checkedMap[key]) checkedMap[key] = { checked: false };
  checkedMap[key].price = val;
}

let extraChecked = {};
function toggleExtra(idx) {
  extraChecked[idx] = !extraChecked[idx];
  const el = document.getElementById(`eichk_${idx}`);
  if (extraChecked[idx]) { el.classList.add('on'); el.textContent = '✓'; }
  else                   { el.classList.remove('on'); el.textContent = ''; }
}

// ─── CONFIRM ───────────────────────────────────────────────────
function updateConfirmBtn() {
  const hasAny = Object.values(checkedMap).some(v => v.checked);
  document.getElementById('confirm-btn').disabled = !hasAny;
}

async function confirmPayment() {
  const obj   = currentObj;
  const items = obj.items;
  const confirmedRows  = [];
  const confirmedExtra = [];

  items.forEach((item, i) => {
    const key = `item_${i}`;
    const ch  = checkedMap[key];
    if (ch?.checked) {
      confirmedRows.push({ rowIndex: item.rowIndex, price: ch.price || '0' });
    }
  });

  // Extras
  const extras = document.querySelectorAll('#extra-items-list .extra-item');
  extras.forEach((el, i) => {
    if (extraChecked[i]) {
      const name  = el.querySelector('.ei-name')?.textContent || '';
      const price = el.querySelector('.ei-price')?.textContent?.replace(/\s*₽/,'').trim() || '0';
      confirmedExtra.push({ name, price });
    }
  });

  document.getElementById('confirm-btn').disabled = true;
  document.getElementById('confirm-btn').textContent = 'Сохранение...';

  try {
    const payload = {
      action:          'confirm_purchase',
      user_id:         USER_ID,
      username:        USERNAME,
      name:            NAME,
      object:          obj.name,
      object_address:  obj.address,
      confirmed_rows:  confirmedRows,
      extra_items:     confirmedExtra
    };
    const r = await fetch(GAS_URL, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload)
    });
    const d   = await r.json();
    if (d.ok) {
      const cnt = confirmedRows.length + confirmedExtra.length;
      document.getElementById('succ-sub-text').textContent = `Подтверждено ${cnt} поз. по объекту «${obj.name}»`;
      document.getElementById('succ-screen').classList.add('show');
    } else {
      alert('Ошибка сохранения: ' + (d.error || 'неизвестная ошибка'));
      document.getElementById('confirm-btn').disabled = false;
      document.getElementById('confirm-btn').textContent = 'Подтвердить оплату';
    }
  } catch(e) {
    alert('Ошибка: ' + e.message);
    document.getElementById('confirm-btn').disabled = false;
    document.getElementById('confirm-btn').textContent = 'Подтвердить оплату';
  }
}

// ─── HELPERS ───────────────────────────────────────────────────
function findBestMatch(productName, receiptItems) {
  if (!receiptItems?.length) return null;
  const norm = s => s.toLowerCase().replace(/[^а-яёa-z0-9]/gi, ' ').replace(/\s+/g,' ').trim();
  const words = norm(productName).split(' ').filter(w => w.length > 2);
  let best = null, bestScore = 0;
  receiptItems.forEach((ri, idx) => {
    const rn = norm(ri.name || '');
    let score = 0;
    words.forEach(w => { if (rn.includes(w)) score++; });
    if (score > bestScore) { bestScore = score; best = { ...ri, _idx: idx }; }
  });
  return bestScore > 0 ? best : null;
}

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Read failed'));
    r.readAsDataURL(file);
  });
}

function formatSize(bytes) {
  if (bytes < 1024)       return bytes + ' B';
  if (bytes < 1024*1024)  return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function plural(n) {
  if (n % 10 === 1 && n % 100 !== 11) return '';
  if ([2,3,4].includes(n%10) && ![12,13,14].includes(n%100)) return 'а';
  return 'ов';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function hide(id)         { const el=document.getElementById(id); if(el) el.style.display='none'; }
function showEl(id, disp) { const el=document.getElementById(id); if(el) el.style.display=disp||'block'; }

init();
</script>
